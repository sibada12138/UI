services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: recharge_card_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "file:./data/dev.db"
      REDIS_URL: "redis://redis:6379"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:3090}"
      ADMIN_JWT_SECRET: "${ADMIN_JWT_SECRET:-replace-with-long-random-string}"
      ADMIN_INIT_USERNAME: "${ADMIN_INIT_USERNAME:-admin}"
      ADMIN_INIT_PASSWORD: "${ADMIN_INIT_PASSWORD:-change-me}"
      OUTBOUND_PROXY_URL: "${OUTBOUND_PROXY_URL:-}"
      EXTERNAL_SUGGEST_CLIENT_ID: "${EXTERNAL_SUGGEST_CLIENT_ID:-1189857434}"
      EXTERNAL_APP_CLIENT_ID: "${EXTERNAL_APP_CLIENT_ID:-1089867636}"
      EXTERNAL_ZIP_VERSION: "${EXTERNAL_ZIP_VERSION:-2.9.91}"
      EXTERNAL_WEB_VERSION: "${EXTERNAL_WEB_VERSION:-2.9.0}"
      EXTERNAL_DEFAULT_DEVICE_ID: "${EXTERNAL_DEFAULT_DEVICE_ID:-web-default-device}"
      RECHARGE_CHANNELS_FILE: "${RECHARGE_CHANNELS_FILE:-./data/recharge-channels.txt}"
      RECHARGE_PRICE_FILE: "${RECHARGE_PRICE_FILE:-./data/recharge-price.txt}"
      EXTERNAL_RECHARGE_H5_TRANSACTION_URL: "${EXTERNAL_RECHARGE_H5_TRANSACTION_URL:-https://api-h5-sub.meitu.com/h5/transaction/v2/create.json}"
      EXTERNAL_RECHARGE_ORDER_CREATE_URL: "${EXTERNAL_RECHARGE_ORDER_CREATE_URL:-https://api.xiuxiu.meitu.com/v1/vip/subscription/order/create.json}"
      EXTERNAL_RECHARGE_CASHIER_URL: "${EXTERNAL_RECHARGE_CASHIER_URL:-https://api.wallet.meitu.com/payment/cashier/agreement.json}"
      CAPTCHA_OCR_PYTHON: "${CAPTCHA_OCR_PYTHON:-python3}"
      CAPTCHA_OCR_SCRIPT: "${CAPTCHA_OCR_SCRIPT:-apps/api/scripts/yolo11_captcha.py}"
      CAPTCHA_OCR_MODEL_PATH: "${CAPTCHA_OCR_MODEL_PATH:-best.onnx}"
      CAPTCHA_OCR_CLASSES_PATH: "${CAPTCHA_OCR_CLASSES_PATH:-classes.txt}"
      CAPTCHA_OCR_TIMEOUT_MS: "${CAPTCHA_OCR_TIMEOUT_MS:-25000}"
      CAPTCHA_OCR_CODE_LENGTH: "${CAPTCHA_OCR_CODE_LENGTH:-4}"
    volumes:
      - api_data:/app/apps/api/data
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: Dockerfile.web
    container_name: recharge_card_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3090}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: "/api"
      API_INTERNAL_BASE: "http://api:3001/api"
    depends_on:
      - api

  redis:
    image: redis:7
    container_name: recharge_card_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  api_data:
  redis_data:
